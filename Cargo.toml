[package]
name = "fractal"
version = "0.1.0"
edition.workspace = true
publish = false

[workspace]
members = ["fractal-core"]
default-members = [".", "fractal-core"]
resolver = "2"

[workspace.package]
edition = "2021"

[workspace.dependencies]
burn = { version = "=0.20.1", default-features = false, features = ["std", "autodiff", "candle", "metal"] }
burn-candle = "=0.20.1"
rand = "0.8"

[dependencies]
fractal-core = { path = "fractal-core" }

[patch.crates-io]
burn-candle = { path = "vendor/burn-candle" }
