name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan tracked files for high-confidence secrets
        run: python3 scripts/check_secrets.py
